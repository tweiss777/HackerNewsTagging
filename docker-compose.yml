services:
  server:
    build:
      context: ./server
    env_file:
      - .env
    environment:
      OPEN_AI_API_KEY: ${OPEN_AI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.4}
      PORT: 3000
    expose:
      - "3000"
    restart: unless-stopped

  client:
    build:
      context: ./client
    ports:
      - "${CLIENT_PORT:-8080}:80"
    depends_on:
      - server
    restart: unless-stopped
